name: shizuku-open-weather-dev

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: shizuku-open-weather-dev:latest
    network_mode: bridge
    working_dir: /workspace
    environment:
      GRADLE_USER_HOME: /home/dev/.gradle
      CARGO_HOME: /home/dev/.cargo
      CARGO_TARGET_DIR: /home/dev/target
      NPM_CONFIG_CACHE: /home/dev/.npm
    ports:
      - "8080:8080"
      - "5173:5173"
      - "4173:4173"
    volumes:
      - .:/workspace
      - cargo-cache:/home/dev/.cargo/registry
      - cargo-git-cache:/home/dev/.cargo/git
      - target-cache:/home/dev/target
      - gradle-cache:/home/dev/.gradle
      - m2-cache:/home/dev/.m2
    tty: true
    stdin_open: true

volumes:
  cargo-cache:
  cargo-git-cache:
  target-cache:
  gradle-cache:
  m2-cache:


