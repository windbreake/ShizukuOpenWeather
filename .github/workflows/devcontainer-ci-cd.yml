name: Devcontainer CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  statuses: write

concurrency:
  group: devcontainer-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVCONTAINER_IMAGE: ghcr.io/windbreake/shizuku-open-weather-dev

jobs:
  validate:
    name: Validate in devcontainer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build devcontainer and run checks
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/devcontainer.json
          runCmd: |
            gradle checkDevEnvironment
            cargo fmt --all -- --check
            cargo clippy --workspace --all-targets -- -D warnings
            cargo test --workspace
            npm --prefix apps/web install
            npm --prefix apps/web run build
            gradle buildAll

  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Test and build APK
        id: android_build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle :apps:android:testDebugUnitTest :apps:android:assembleDebug --stacktrace 2>&1 | tee android-build.log

      - name: Extract Android failure
        id: diagnostic
        if: steps.android_build.outcome == 'failure'
        shell: bash
        run: |
          message="$(grep -E '^e: ' android-build.log | tail -n 1)"
          if [ -z "$message" ]; then
            message="$(awk '/^\* What went wrong:/{getline; print; exit}' android-build.log)"
          fi
          if [ -z "$message" ]; then
            message="$(grep -E '^> ' android-build.log | tail -n 1)"
          fi
          message="$(printf '%s' "$message" | tr '\n' ' ' | cut -c1-135)"
          if [ -z "$message" ]; then
            message="Android APK build failed; open the workflow log for details"
          fi
          echo "message=$message" >> "$GITHUB_OUTPUT"

      - name: Upload Android build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ShizukuOpenWeather-Android-build-log
          path: android-build.log
          if-no-files-found: ignore

      - name: Upload APK
        if: steps.android_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ShizukuOpenWeather-Android
          path: apps/android/build/outputs/apk/debug/android-debug.apk

      - name: Publish readable Android status
        if: always()
        uses: actions/github-script@v7
        env:
          BUILD_OUTCOME: ${{ steps.android_build.outcome }}
          BUILD_MESSAGE: ${{ steps.diagnostic.outputs.message }}
        with:
          script: |
            const passed = process.env.BUILD_OUTCOME === 'success';
            const description = passed
              ? 'Android APK built successfully'
              : (process.env.BUILD_MESSAGE || 'Android APK build failed').slice(0, 140);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request?.head.sha ?? context.sha,
              state: passed ? 'success' : 'failure',
              context: 'android/build',
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
            if (!passed) core.setFailed(description);

  publish-devcontainer:
    name: Publish devcontainer image
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEVCONTAINER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push devcontainer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
