name: Android CI and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "apps/android/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - ".github/workflows/android.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/android/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Test and build APK
        run: gradle :apps:android:testDebugUnitTest :apps:android:assembleDebug --stacktrace

      - name: Name release asset
        if: startsWith(github.ref, 'refs/tags/')
        run: cp apps/android/build/outputs/apk/debug/android-debug.apk "ShizukuOpenWeather-Android-${GITHUB_REF_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShizukuOpenWeather-Android
          path: apps/android/build/outputs/apk/debug/android-debug.apk

      - name: Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ShizukuOpenWeather-Android-${{ github.ref_name }}.apk
