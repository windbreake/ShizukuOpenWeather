name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version used for installer and assets
        required: true
        default: 0.1.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-desktop:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: vars
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            "version=${{ inputs.version }}" >> $env:GITHUB_OUTPUT
          }
          else {
            $tag = '${{ github.ref_name }}'
            if ($tag.StartsWith('v')) {
              $tag = $tag.Substring(1)
            }
            "version=$tag" >> $env:GITHUB_OUTPUT
          }

      - name: Build desktop installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/build-desktop-installer.ps1 -Version "${{ steps.vars.outputs.version }}" -ArtifactDir "$env:RUNNER_TEMP\desktop-release"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ steps.vars.outputs.version }}
          path: ${{ runner.temp }}\desktop-release

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}\desktop-release\ShizukuOpenWeather-Setup-${{ steps.vars.outputs.version }}.exe
            ${{ runner.temp }}\desktop-release\ShizukuOpenWeather-portable-${{ steps.vars.outputs.version }}.zip
